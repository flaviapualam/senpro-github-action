name : Test, Build, and Deploy | Modul 01 - Lab2.2 Senior Project

on:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: [16.x]
          cache: npm

      - run: npm install
      - run: npm run build

  deploy:
    needs: test-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            echo "Cek folder project";

            if [ ! -d "${HOME}/senpro/494376/modul02/senpro-github-action/" ]; then
              echo "Repository belum di-clone. Cloning...";
              mkdir -p ~/senpro/494376/modul02;
              cd ~/senpro/494376/modul02;
              git clone https://github.com/flaviapualam/senpro-github-action;
            fi

            cd ~/senpro/494376/modul02/senpro-github-action;
            git pull origin main;

            echo "Install Package dan Build Project";
            npm install;
            npm run build;